<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>פגיעות קרנית על רקע מגע בקבוק</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --blue: #0057FF; --blue-light: #EBF0FF; --blue-mid: #3B7BFF;
  --green: #00A878; --green-light: #E6F7F3;
  --red: #E63946; --red-light: #FDECEA;
  --orange: #F4A223;
  --text: #1A1D2E; --text2: #6B7280;
  --border: #E5E8F0; --bg: #F7F9FC; --white: #FFFFFF;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,87,255,0.07);
  --shadow-lg: 0 8px 32px rgba(0,87,255,0.13);
}
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

/* HEADER */
.header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 58px;
  display: flex; align-items: center; gap: 11px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.header-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #0057FF, #3B7BFF);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.header-title { font-size: 14px; font-weight: 800; line-height: 1.2; flex:1; }
.header-sub { font-size: 11px; color: var(--text2); font-weight: 400; }
.sync-chip {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 10px;
  font-size: 11px; font-weight: 600; color: var(--text2);
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); transition: background .3s; }
.sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }
.sync-dot.offline { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* LOADING SCREEN */
#loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; padding: 40px 20px; text-align: center;
}
.big-spinner {
  width: 52px; height: 52px; border: 4px solid var(--border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin .8s linear infinite; margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-screen h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
#loading-screen p { font-size: 14px; color: var(--text2); }

/* MAIN */
#main-app { display: none; padding: 14px; padding-bottom: 90px; max-width: 460px; margin: 0 auto; }

/* Progress card */
.progress-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px; margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.prog-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
.prog-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .4px; }
.prog-pct { font-size: 30px; font-weight: 800; line-height: 1; }
.prog-track { height: 11px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border); }
.prog-fill { height: 100%; border-radius: 99px; transition: width .7s cubic-bezier(.4,0,.2,1), background .7s ease; }
.prog-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.pstat { background: var(--bg); border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid var(--border); }
.pstat-val { font-size: 18px; font-weight: 800; }
.pstat-lbl { font-size: 10px; color: var(--text2); font-weight: 500; margin-top: 2px; }
.c-blue { color: var(--blue); } .c-green { color: var(--green); } .c-orange { color: var(--orange); }

/* Search */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-ico { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }
.search-input {
  width: 100%; background: var(--white); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 40px 12px 14px;
  font-family: 'Heebo', sans-serif; font-size: 14px; color: var(--text);
  box-shadow: var(--shadow); transition: border-color .2s, box-shadow .2s;
}
.search-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,87,255,.1); }

/* Filter tabs */
.ftabs { display: flex; gap: 7px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.ftabs::-webkit-scrollbar { display: none; }
.ftab {
  flex-shrink: 0; padding: 7px 14px; border-radius: 99px;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--text2); font-family: 'Heebo', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .18s;
  white-space: nowrap;
}
.ftab.active { background: var(--blue); border-color: var(--blue); color: white; box-shadow: 0 2px 8px rgba(0,87,255,.22); }

/* Patient list */
.plist { display: flex; flex-direction: column; gap: 8px; }
.pcard {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .18s; box-shadow: var(--shadow);
}
.pcard:active { transform: scale(.99); }
.pcard:hover { border-color: var(--blue); box-shadow: var(--shadow-lg); }
.pcard.done { border-color: #C2E8DC; background: #F5FCFA; }
.pcard.done:hover { border-color: var(--green); }
.pcard-body { flex: 1; }
.pcard-no { font-size: 17px; font-weight: 800; margin-bottom: 5px; }
.pcard-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; font-weight: 500; color: var(--text2); background: var(--bg); border-radius: 6px; padding: 2px 8px; border: 1px solid var(--border); }
.status-pill { font-size: 11px; font-weight: 700; border-radius: 99px; padding: 5px 11px; flex-shrink: 0; }
.pill-empty { background: var(--red-light); color: var(--red); }
.pill-done  { background: var(--green-light); color: var(--green); }

.list-empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.list-empty-ico { font-size: 44px; margin-bottom: 10px; }
.load-more {
  width: 100%; margin-top: 10px; background: var(--white);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 13px; font-family: 'Heebo', sans-serif;
  font-size: 14px; font-weight: 600; color: var(--blue); cursor: pointer;
  transition: all .18s;
}
.load-more:hover { background: var(--blue-light); border-color: var(--blue); }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(15,20,40,.4); backdrop-filter: blur(3px);
  display: flex; flex-direction: column; justify-content: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .22s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--white); border-radius: 22px 22px 0 0;
  max-height: 93vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.34,1.2,.64,1);
}
.modal-bg.open .modal-sheet { transform: translateY(0); }
.modal-pill { width: 38px; height: 4px; background: var(--border); border-radius: 99px; margin: 11px auto 0; }
.modal-hdr {
  padding: 14px 18px 13px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--white); z-index: 5;
}
.modal-title { font-size: 20px; font-weight: 800; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text2); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 16px 18px 36px; }

/* Detail grid */
.dgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.ditem { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; }
.ditem.full { grid-column: 1/-1; }
.dlbl { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: .4px; margin-bottom: 3px; }
.dval { font-size: 14px; font-weight: 700; }
.dval.sm { font-size: 12px; font-weight: 400; line-height: 1.65; }

/* Saved cause */
.saved-box {
  background: var(--green-light); border: 1.5px solid #9ADCCC;
  border-radius: 12px; padding: 13px 14px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.saved-ico { font-size: 20px; }
.saved-lbl { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: .3px; margin-bottom: 3px; }
.saved-val { font-size: 15px; font-weight: 700; }

/* Cause section */
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .5px; margin-bottom: 10px; }
.cause-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.cause-btn {
  background: var(--bg); border: 2px solid var(--border); border-radius: 12px;
  padding: 14px 8px; font-family: 'Heebo', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text);
  cursor: pointer; transition: all .16s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 6px; line-height: 1.3;
}
.cause-btn .ico { font-size: 22px; }
.cause-btn:hover { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.cause-btn.sel-blue { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.cause-btn.sel-purple { border-color: #7C3AED; background: #F3EEFF; color: #7C3AED; }
.other-area {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 13px; direction: rtl;
  font-family: 'Heebo', sans-serif; font-size: 14px; color: var(--text);
  resize: none; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s;
}
.other-area:focus { outline: none; border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,.1); }

/* Action row */
.act-row { display: flex; gap: 9px; }
.btn-save {
  flex: 1; background: var(--blue); border: none; border-radius: 12px;
  padding: 14px; color: white; font-family: 'Heebo', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,87,255,.22); transition: all .18s;
}
.btn-save:hover:not(:disabled) { background: #0047DD; transform: translateY(-1px); }
.btn-save:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-del {
  background: var(--white); border: 1.5px solid #FAC0BC;
  border-radius: 12px; padding: 14px 16px; color: var(--red);
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .18s;
}
.btn-del:hover:not(:disabled) { background: var(--red-light); border-color: var(--red); }
.btn-del:disabled { opacity: .32; cursor: not-allowed; }

/* Toast */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(90px);
  border-radius: 99px; padding: 12px 22px;
  font-size: 14px; font-weight: 600; z-index: 999;
  white-space: nowrap; max-width: 88vw;
  box-shadow: 0 6px 24px rgba(0,0,0,.18);
  transition: transform .28s cubic-bezier(.34,1.4,.64,1);
  color: white;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { background: #1B8A60; }
.toast.err { background: var(--red); }
.toast.info { background: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">👁</div>
  <div style="flex:1">
    <div class="header-title">פגיעות קרנית על רקע מגע בקבוק</div>
    <div class="header-sub">תיעוד אטיולוגיה — מחקר</div>
  </div>
  <div class="sync-chip" id="sync-chip">
    <div class="sync-dot syncing" id="sync-dot"></div>
    <span id="sync-txt">מתחבר...</span>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="big-spinner"></div>
  <h3>טוען נתונים מהענן...</h3>
  <p>מתחבר ל-Google Sheets</p>
</div>

<!-- MAIN -->
<div id="main-app">
  <div class="progress-card">
    <div class="prog-top">
      <div class="prog-label">התקדמות מילוי נתונים</div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-stats">
      <div class="pstat"><div class="pstat-val c-blue">1,615</div><div class="pstat-lbl">סה"כ מטופלים</div></div>
      <div class="pstat"><div class="pstat-val c-green" id="stat-done">0</div><div class="pstat-lbl">הושלמו</div></div>
      <div class="pstat"><div class="pstat-val c-orange" id="stat-left">1,615</div><div class="pstat-lbl">נותרו</div></div>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="search-inp" class="search-input" placeholder="חיפוש לפי מספר מטופל..." oninput="doFilter()">
  </div>

  <div class="ftabs">
    <button class="ftab active" data-f="all"   onclick="setFilter('all',this)">הכל <span id="tab-all">(1,615)</span></button>
    <button class="ftab"        data-f="empty" onclick="setFilter('empty',this)">ממתינים <span id="tab-empty">(1,615)</span></button>
    <button class="ftab"        data-f="done"  onclick="setFilter('done',this)">הושלמו <span id="tab-done">(0)</span></button>
  </div>

  <div class="plist" id="plist"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="bgClick(event)">
  <div class="modal-sheet">
    <div class="modal-pill"></div>
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title">מטופל #1</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="dgrid" id="dgrid"></div>
      <div class="saved-box" id="saved-box" style="display:none">
        <div class="saved-ico">✅</div>
        <div><div class="saved-lbl">סיבת פגיעה שמורה</div><div class="saved-val" id="saved-val"></div></div>
      </div>
      <div class="sec-lbl">בחר סיבת פגיעה בקרנית</div>
      <div class="cause-grid">
        <button class="cause-btn" data-c="גוף זר"              onclick="pickCause(this)"><span class="ico">🪨</span>גוף זר</button>
        <button class="cause-btn" data-c="עדשות מגע"           onclick="pickCause(this)"><span class="ico">👁</span>עדשות מגע</button>
        <button class="cause-btn" data-c="מגע בקבוק בקרנית"   onclick="pickCause(this)"><span class="ico">💧</span>מגע בקבוק<br>בקרנית</button>
        <button class="cause-btn" data-c="אחר"                 onclick="pickCause(this)"><span class="ico">✏️</span>אחר</button>
      </div>
      <textarea id="other-area" class="other-area" rows="3" placeholder="פרט את הסיבה..." style="display:none" oninput="validateBtn()"></textarea>
      <div class="act-row">
        <button class="btn-save" id="btn-save" onclick="doSave()" disabled>💾 שמור</button>
        <button class="btn-del"  id="btn-del"  onclick="doDelete()" disabled>🗑</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

"sex":"F","eye":"Right (OD)","clinic":"Ophthalmology ER","diagnosis":"Corneal Abscess","date":"2024-10-13","slitlamp":"שקופה, תסנין עגול פרילימבלי לשעה 4 בגדול 1 ממ ללא הייז","proc_row":2069}];

// ── STATE ──────────────────────────────────────────────
let causes = {};
let curPt = null, selCause = null;
let filter = 'all', searchQ = '', pageSize = 50;

// ── INIT ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadFromCloud()
    .then(() => startApp())
    .catch(err => {
      console.error(err);
      // fallback to local
      const s = localStorage.getItem('crnea_causes');
      if (s) causes = JSON.parse(s);
      setSyncStatus('offline','לא מחובר');
      startApp();
      toast('⚠️ לא ניתן להתחבר לענן — ממשיך במצב מקומי','err');
    });
});

function startApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  updateProgress();
  renderList();
  // Sync every 45 sec
  setInterval(() => {
    loadFromCloud()
      .then(() => { updateProgress(); renderList(); })
      .catch(() => setSyncStatus('offline','לא מחובר'));
  }, 45000);
}

// ── CLOUD ──────────────────────────────────────────────
async function loadFromCloud() {
  setSyncStatus('syncing','טוען...');
  const r = await fetch(SCRIPT_URL, {method:'GET', redirect:'follow'});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  causes = {};
  Object.entries(d).forEach(([k,v]) => { if (v) causes[+k] = v; });
  localStorage.setItem('crnea_causes', JSON.stringify(causes));
  setSyncStatus('online','מחובר');
}

async function cloudPost(payload) {
  setSyncStatus('syncing', payload.action==='delete' ? 'מוחק...' : 'שומר...');
  const r = await fetch(SCRIPT_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  setSyncStatus('online','מחובר');
}

function setSyncStatus(state, txt) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state==='online' ? '' : ' '+state);
  document.getElementById('sync-txt').textContent = txt;
}

// ── PROGRESS ───────────────────────────────────────────
function updateProgress() {
  const total = PATIENTS.length;
  const done = Object.values(causes).filter(v=>v&&v.trim()).length;
  const pct = Math.round(done/total*100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('stat-done').textContent = done.toLocaleString();
  document.getElementById('stat-left').textContent = (total-done).toLocaleString();
  const fill = document.getElementById('prog-fill');
  fill.style.width = pct+'%';
  // red→orange→green
  const r = pct<50 ? 220 : Math.round(220*(1-(pct-50)/50));
  const g = pct<50 ? Math.round(168*pct/50) : 168;
  const b = pct<50 ? 0 : Math.round(100*(pct-50)/50);
  fill.style.background = `linear-gradient(90deg,rgb(${r},${g},${b}),rgb(${Math.max(0,r-20)},${Math.min(190,g+15)},${b+10}))`;
  document.getElementById('tab-all').textContent   = `(${total.toLocaleString()})`;
  document.getElementById('tab-empty').textContent = `(${(total-done).toLocaleString()})`;
  document.getElementById('tab-done').textContent  = `(${done.toLocaleString()})`;
}

// ── LIST ───────────────────────────────────────────────
function doFilter() { searchQ=document.getElementById('search-inp').value.trim(); pageSize=50; renderList(); }
function setFilter(f,el) {
  filter=f; pageSize=50;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function getFiltered() {
  return PATIENTS.filter(p => {
    if (searchQ && !String(p.no).includes(searchQ)) return false;
    if (filter==='empty') return !causes[p.no]||!causes[p.no].trim();
    if (filter==='done')  return  causes[p.no]&& causes[p.no].trim();
    return true;
  });
}
function eyeLabel(e) {
  if (!e) return '';
  if (e.includes('Left')||e.includes('OS'))  return 'עין שמאל';
  if (e.includes('Right')||e.includes('OD')) return 'עין ימין';
  if (e.includes('Both')||e.includes('OU'))  return 'שתי עיניים';
  return e;
}
function renderList() {
  const list = document.getElementById('plist');
  const filtered = getFiltered();
  const page = filtered.slice(0, pageSize);
  if (!page.length) {
    list.innerHTML=`<div class="list-empty"><div class="list-empty-ico">🔍</div><p>לא נמצאו מטופלים</p></div>`;
    return;
  }
  list.innerHTML = page.map(p=>{
    const isDone = causes[p.no]&&causes[p.no].trim();
    const dateDisp = p.date ? p.date.split('-').reverse().join('/') : '';
    return `<div class="pcard ${isDone?'done':''}" onclick="openPt(${p.no})">
      <div class="pcard-body">
        <div class="pcard-no">מטופל #${p.no}</div>
        <div class="pcard-tags">
          ${p.age?`<span class="tag">${p.age} שנ'</span>`:''}
          <span class="tag">${p.sex==='M'?'זכר':p.sex==='F'?'נקבה':p.sex}</span>
          <span class="tag">${eyeLabel(p.eye)}</span>
          ${dateDisp?`<span class="tag">${dateDisp}</span>`:''}
        </div>
      </div>
      <div class="status-pill ${isDone?'pill-done':'pill-empty'}">${isDone?'✓ הושלם':'ממתין'}</div>
    </div>`;
  }).join('');
  if (filtered.length > pageSize) {
    const btn = document.createElement('button');
    btn.className='load-more';
    btn.textContent=`טען עוד (${(filtered.length-pageSize).toLocaleString()} נוספים)`;
    btn.onclick=()=>{pageSize+=50; renderList();};
    list.appendChild(btn);
  }
}

// ── MODAL ──────────────────────────────────────────────
function openPt(no) {
  const p = PATIENTS.find(x=>x.no===no); if(!p) return;
  curPt=p; selCause=null;
  document.getElementById('modal-title').textContent=`מטופל #${p.no}`;
  const dateDisp=p.date?p.date.split('-').reverse().join('/'):'';
  document.getElementById('dgrid').innerHTML=`
    <div class="ditem"><div class="dlbl">גיל</div><div class="dval">${p.age||'—'}</div></div>
    <div class="ditem"><div class="dlbl">מין</div><div class="dval">${p.sex==='M'?'זכר':p.sex==='F'?'נקבה':'—'}</div></div>
    <div class="ditem"><div class="dlbl">עין מעורבת</div><div class="dval">${eyeLabel(p.eye)||'—'}</div></div>
    <div class="ditem"><div class="dlbl">תאריך בדיקה</div><div class="dval">${dateDisp||'—'}</div></div>
    <div class="ditem full"><div class="dlbl">אבחנה</div><div class="dval">${p.diagnosis||'—'}</div></div>
    <div class="ditem full"><div class="dlbl">מרפאה</div><div class="dval" style="font-size:13px;font-weight:600">${p.clinic||'—'}</div></div>
    ${p.slitlamp?`<div class="ditem full"><div class="dlbl">ממצא מנורת סדק</div><div class="dval sm">${p.slitlamp}</div></div>`:''}`;
  document.querySelectorAll('.cause-btn').forEach(b=>b.classList.remove('sel-blue','sel-purple'));
  document.getElementById('other-area').style.display='none';
  document.getElementById('other-area').value='';
  const saved=causes[p.no];
  if (saved&&saved.trim()) {
    document.getElementById('saved-box').style.display='flex';
    document.getElementById('saved-val').textContent=saved;
    document.getElementById('btn-del').disabled=false;
  } else {
    document.getElementById('saved-box').style.display='none';
    document.getElementById('btn-del').disabled=true;
  }
  document.getElementById('btn-save').disabled=true;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow=''; curPt=null;
}
function bgClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function pickCause(btn) {
  document.querySelectorAll('.cause-btn').forEach(b=>b.classList.remove('sel-blue','sel-purple'));
  selCause=btn.dataset.c;
  if (selCause==='אחר') {
    btn.classList.add('sel-purple');
    document.getElementById('other-area').style.display='block';
    document.getElementById('btn-save').disabled=!document.getElementById('other-area').value.trim();
  } else {
    btn.classList.add('sel-blue');
    document.getElementById('other-area').style.display='none';
    document.getElementById('btn-save').disabled=false;
  }
}
function validateBtn() {
  if(selCause==='אחר') document.getElementById('btn-save').disabled=!document.getElementById('other-area').value.trim();
}

async function doSave() {
  if(!curPt||!selCause) return;
  let cause=selCause;
  if(cause==='אחר'){
    const t=document.getElementById('other-area').value.trim();
    if(!t){toast('⚠️ נא לפרט את הסיבה','err');return;}
    cause='אחר: '+t;
  }
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='⏳ שומר...';
  try {
    await cloudPost({action:'save', no:curPt.no, cause});
    causes[curPt.no]=cause;
    localStorage.setItem('crnea_causes',JSON.stringify(causes));
    document.getElementById('saved-box').style.display='flex';
    document.getElementById('saved-val').textContent=cause;
    document.getElementById('btn-del').disabled=false;
    updateProgress(); renderList();
    toast('✅ נשמר בהצלחה','ok');
  } catch(e){ toast('❌ שגיאה בשמירה: '+e.message,'err'); }
  btn.textContent='💾 שמור'; btn.disabled=false;
}

async function doDelete() {
  if(!curPt||!confirm('למחוק את סיבת הפגיעה השמורה?')) return;
  const btn=document.getElementById('btn-del'); btn.disabled=true;
  try {
    await cloudPost({action:'delete', no:curPt.no});
    delete causes[curPt.no];
    localStorage.setItem('crnea_causes',JSON.stringify(causes));
    document.getElementById('saved-box').style.display='none';
    document.querySelectorAll('.cause-btn').forEach(b=>b.classList.remove('sel-blue','sel-purple'));
    document.getElementById('other-area').style.display='none';
    document.getElementById('btn-save').disabled=true;
    updateProgress(); renderList();
    toast('🗑 נמחק בהצלחה','ok');
  } catch(e){ toast('❌ שגיאה במחיקה: '+e.message,'err'); btn.disabled=false; }
}

// ── TOAST ──────────────────────────────────────────────
let _tt;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+type;
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3200);
}
</script>
